; Fall Guardian v3 — ESP32-S3 wrist device firmware (PLAN Phase 31).
;
; Pipeline on-device: MPU6050 @ 50 Hz → 125x6 sliding window (62-sample stride)
; → ConvLSTM-tiny INT8 under TFLite Micro → grace period (haptic + 10 s cancel)
; → HTTPS to the FastAPI gateway (device JWT from BLE pairing, stored in NVS).
;
; Build: `pio run`   Flash: `pio run -t upload`   Monitor: `pio device monitor`
; NOTE: edge/include/model.h ships as a placeholder — generate the real one with
;   ml/scripts/export_tflite.py (Linux/Docker) or ml/scripts/tflite_to_header.py.

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; The model + tensor arena live comfortably in internal SRAM (~46 KB flatbuffer,
; ~96 KB arena); no PSRAM requirement, so any S3 module works.
board_build.partitions = default.csv

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=2
    ; Uncomment for local-gateway development ONLY — disables TLS verification.
    ; -DFG_DEV_TLS_INSECURE=1

lib_deps =
    ; TFLite Micro kernels packaged for ESP32 Arduino. If the fused INT8 LSTM op
    ; is missing from this build, switch to Espressif's esp-tflite-micro (IDF
    ; component) — flagged as the known conversion risk in ml/eval/quantize.py.
    tanakamasayuki/TensorFlowLite_ESP32@^1.0.0
    ; JSON parsing of gateway responses (requests are streamed by hand — a 125-
    ; sample window envelope is ~12 KB; building it as a doc would double RAM).
    bblanchon/ArduinoJson@^7.0.0
    ; BLE GATT provisioning. NimBLE is ~100 KB smaller than Bluedroid and the
    ; S3 radio is shared with WiFi, so the lean stack matters.
    h2zero/NimBLE-Arduino@^2.1.0
    ; MPU6050 is driven by our own register-level I2C driver (src/imu.cpp) — no
    ; library dependency for the most safety-critical input path.
