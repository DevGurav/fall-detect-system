# Fly.io deployment — Fall Guardian cloud gateway.
#
# This config lives with the Dockerfile in backend/; deploy from here:
#
#   cd backend
#   fly deploy
#
# First-time setup (run manually — intentionally NOT in CI):
#
#   fly launch --no-deploy --copy-config --name fall-guardian --region bom
#   fly postgres create --name fall-guardian-db --region bom   # or attach Supabase
#   fly postgres attach fall-guardian-db                        # provisions a DATABASE_URL
#   fly redis create --region bom                               # Upstash; provisions a REDIS_URL
#   fly secrets set \
#       FG_JWT_SECRET="$(openssl rand -hex 32)" \
#       FG_DATABASE_URL="postgresql+asyncpg://USER:PASS@HOST:5432/DB" \
#       FG_REDIS_URL="redis://default:PASS@HOST:6379" \
#       FG_FIREBASE_CREDENTIALS='{...serviceAccountKey.json...}' \
#       FG_BETTER_STACK_TOKEN="..."
#
# Note: Fly's Postgres/Redis attach commands export DATABASE_URL / REDIS_URL, but
# this app reads the FG_-prefixed names — set FG_DATABASE_URL / FG_REDIS_URL above
# (FG_DATABASE_URL must use the postgresql+asyncpg:// driver scheme).

app = "fall-guardian"
primary_region = "bom"   # Mumbai — keep data + latency in-region (PRIVACY.md)

[build]
  dockerfile = "Dockerfile"

[env]
  FG_ENVIRONMENT = "production"   # config.py validator then requires a real FG_JWT_SECRET
  PORT = "8080"

[deploy]
  # Run migrations on a one-off machine (with secrets injected) before the new
  # release takes traffic.
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine always warm — no cold starts (project requirement).
  # `min_machines_running` is the current Fly key for what older configs called
  # `min_instances`; pairing it with auto_stop_machines = "off" guarantees the
  # warm machine is never suspended.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  # Liveness / startup probe.
  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"

  # Readiness probe — exercises Postgres + Redis (returns 503 when degraded).
  [[http_service.checks]]
    method = "GET"
    path = "/health/ready"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"   # torch-free ONNX serving fits comfortably
