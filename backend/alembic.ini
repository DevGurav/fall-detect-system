# Alembic configuration for the Fall Guardian backend.
#
# The database URL is NOT hard-coded here: alembic/env.py reads it at runtime
# from app settings (FG_DATABASE_URL, or the deprecated FG_RETRAINING_DB_DSN).
# Run from the `backend/` directory, e.g.:
#   FG_DATABASE_URL=postgresql+asyncpg://user:pass@localhost:5432/fall_guardian \
#       python -m alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
